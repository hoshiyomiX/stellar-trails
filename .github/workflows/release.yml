name: Release

on:
  push:
    tags:
      # Trigger on any version tag: v7.1.0, v7.1.1, v7.2.0, etc.
      # Excludes 'latest' (mutable tag, pushed manually or by another workflow).
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # pre-releases like v7.1.0-rc.1

permissions:
  contents: write  # needed to create GitHub release + move 'latest' tag

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # shallow clone, we only need the tagged commit

      - name: Verify skill directory exists
        run: |
          if [ ! -d skill/stellar-trails ]; then
            echo "::error::skill/stellar-trails/ directory not found in tag ${{ github.ref_name }}"
            exit 1
          fi
          if [ ! -f skill/stellar-trails/SKILL.md ]; then
            echo "::error::SKILL.md not found in skill/stellar-trails/"
            exit 1
          fi
          echo "✓ Skill directory verified"

      - name: Extract version from SKILL.md
        id: version
        run: |
          # Extract version from SKILL.md metadata: "- **version**: 7.1.1"
          # Line format: "- **version**: 7.1.1" (markdown bullet list with bold key)
          VERSION=$(grep -oP '^\- \*\*version\*\*:\s*\K[0-9]+\.[0-9]+\.[0-9]+' skill/stellar-trails/SKILL.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from SKILL.md"
            echo "::error::Expected line format: '- **version**: X.Y.Z'"
            echo "::error::Actual SKILL.md content (first 15 lines):"
            head -15 skill/stellar-trails/SKILL.md | sed 's/^/::error::  /'
            exit 1
          fi
          TAG_NAME="${{ github.ref_name }}"
          # Strip leading 'v' from tag for comparison
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: SKILL.md says $VERSION, tag says $TAG_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "✓ Version verified: $VERSION (tag $TAG_NAME)"

      - name: Build skill zip
        id: build
        run: |
          # Build zip with stellar-trails/ as top-level dir inside zip
          # (ZAI service expects /home/z/my-project/skills/stellar-trails/ after extraction)
          cd skill
          zip -qr ../stellar-trails.zip stellar-trails/
          cd ..
          ZIP_FILE="stellar-trails.zip"
          ZIP_SHA=$(sha256sum "$ZIP_FILE" | awk '{print $1}')
          ZIP_SIZE=$(stat -c%s "$ZIP_FILE")
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zip_sha=$ZIP_SHA" >> $GITHUB_OUTPUT
          echo "zip_size=$ZIP_SIZE" >> $GITHUB_OUTPUT
          echo "✓ Built $ZIP_FILE ($ZIP_SIZE bytes, SHA-256: ${ZIP_SHA:0:12}...)"

      - name: Generate SHA256 checksum file
        run: |
          sha256sum stellar-trails.zip > stellar-trails.zip.sha256
          echo "✓ Checksum file generated"
          cat stellar-trails.zip.sha256

      - name: Verify zip contents
        run: |
          echo "=== Zip contents ==="
          unzip -l stellar-trails.zip
          echo
          echo "=== SKILL.md version in zip ==="
          unzip -p stellar-trails.zip stellar-trails/SKILL.md | grep -E "^- \*\*version\*\*:|STELLAR TRAILS ·" | head -3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: stellar-trails v${{ steps.version.outputs.version }}
          body: |
            # stellar-trails v${{ steps.version.outputs.version }}

            ## Install on ZAI platform

            ```bash
            # Download asset dari release ini (atau pakai gh CLI)
            gh release download v${{ steps.version.outputs.version }} \
              --repo hoshiyomiX/stellar-trails \
              --pattern 'stellar-trails.zip' \
              --dir /tmp/

            # Upload ke ZAI persistent storage
            cp /tmp/stellar-trails.zip /home/user_skills/stellar-trails.zip
            touch /home/user_skills/.stellar-trails.usermark
            ```

            Next ZAI session akan auto-extract skill ke `/home/z/my-project/skills/stellar-trails/`.

            ## Install standalone (non-ZAI)

            See [README.md](https://github.com/hoshiyomiX/stellar-trails/blob/${{ steps.version.outputs.tag }}/README.md#path-b--standalone-non-zai-optional-bootsh) for Path B instructions.

            ## Checksum

            - File: `stellar-trails.zip`
            - Size: ${{ steps.build.outputs.zip_size }} bytes
            - SHA-256: `${{ steps.build.outputs.zip_sha }}`

            Verify after download:
            ```bash
            sha256sum stellar-trails.zip
            # Should match: ${{ steps.build.outputs.zip_sha }}
            ```

            ## Changelog

            See [CHANGELOG.md](https://github.com/hoshiyomiX/stellar-trails/blob/${{ steps.version.outputs.tag }}/skill/stellar-trails/CHANGELOG.md) for full history.
          files: |
            stellar-trails.zip
            stellar-trails.zip.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

      - name: Update 'latest' tag (mutable, points to newest release)
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        run: |
          # Move 'latest' tag to this commit. Force-push because 'latest' is mutable.
          # Only do this for stable releases (no pre-release suffix).
          git tag -f latest ${{ github.sha }}
          git push -f origin refs/tags/latest
          echo "✓ 'latest' tag moved to ${{ steps.version.outputs.tag }} (${{ github.sha }})"

      - name: Publish to ClawHub
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -o pipefail  # propagate failures through pipes
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret not set — ClawHub publish cannot proceed"
            echo "::error::Set it in: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: CLAWHUB_TOKEN, Value: your ClawHub API token (clh_...)"
            echo "::error::This is a REQUIRED secret — without it, clawhub update will never get the new version"
            exit 1
          fi

          # Pin CLI version so behavior is deterministic across runs.
          # v0.23.1 is the version tested with this workflow.
          npm install -g clawhub@0.23.1 || npm install -g clawhub
          clawhub --cli-version

          # Capture login output to a log so we can show WHY it failed if it does.
          LOGIN_LOG=$(mktemp)
          if ! clawhub login --token "$CLAWHUB_TOKEN" --label "github-actions-${{ github.run_id }}" >"$LOGIN_LOG" 2>&1; then
            echo "::error::clawhub login failed — token may be expired, invalid, or revoked"
            echo "::error::Login output:"
            sed 's/^/::error::  /' "$LOGIN_LOG"
            echo "::error::Generate a new token at https://clawhub.ai and update the CLAWHUB_TOKEN secret"
            exit 1
          fi
          echo "✓ ClawHub login successful"

          # Use --json for robust parsing. The text output format wraps fields in
          # box-drawing chars and uses spaces (not colons), which previously broke
          # the `^Latest:\s*\K[0-9.]+` regex — that regex never matched, so the
          # "already published" branch was dead code.
          inspect_json=$(clawhub inspect stellar-trails --json 2>/dev/null || echo '{}')
          # Single-line python script — multi-line scripts had IndentationError
          # because bash preserves leading whitespace inside quotes.
          # || echo "" handles invalid JSON (clawhub inspect failure → 404 page).
          latest_on_registry=$(echo "$inspect_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print((d.get('latestVersion') or {}).get('version') or '')" 2>/dev/null || echo "")

          echo "Registry state for stellar-trails: latest=${latest_on_registry:-<not found / hidden>}"

          # If skill was soft-deleted (slug reserved but hidden), restore it first.
          # undelete is idempotent: if the skill is not in deleted state, the
          # command returns an error which we ignore. This step is necessary
          # because `clawhub skill publish --slug X` is rejected when slug X is
          # in deleted/hidden state — ClawHub requires the slug to be restored
          # before a new version can be published under it.
          UNDELETE_LOG=$(mktemp)
          if clawhub undelete stellar-trails --yes >"$UNDELETE_LOG" 2>&1; then
            echo "✓ stellar-trails was in deleted state — restored"
          else
            # Not deleted (or already active) — expected in normal operation.
            echo "ℹ️ undelete skipped (skill not in deleted state, or already active)"
            # Show the message in case it's something unexpected (not 'not deleted').
            head -3 "$UNDELETE_LOG" | sed 's/^/   /'
          fi

          # Skip publish if the exact version is already on the registry.
          if [ "$latest_on_registry" = "${{ steps.version.outputs.version }}" ]; then
            echo "ℹ️ stellar-trails@${{ steps.version.outputs.version }} already on registry — skipping publish"
            exit 0
          fi

          echo "Publishing stellar-trails@${{ steps.version.outputs.version }} to ClawHub..."
          PUBLISH_LOG=$(mktemp)
          clawhub skill publish "$GITHUB_WORKSPACE/skill/stellar-trails" \
            --slug stellar-trails \
            --version ${{ steps.version.outputs.version }} \
            --source-repo ${{ github.server_url }}/${{ github.repository }} \
            --source-commit ${{ github.sha }} \
            --changelog "v${{ steps.version.outputs.version }} — see CHANGELOG.md" \
            >"$PUBLISH_LOG" 2>&1
          PUBLISH_EXIT=$?

          if [ $PUBLISH_EXIT -ne 0 ]; then
            echo "::error::clawhub skill publish failed with exit code $PUBLISH_EXIT"
            echo "::error::Full output from clawhub skill publish:"
            sed 's/^/::error::  /' "$PUBLISH_LOG"
            echo "::error::This means clawhub update will NOT get v${{ steps.version.outputs.version }}"
            echo "::error::Likely causes:"
            echo "::error::  - Slug 'stellar-trails' is in deleted state — undelete step above should have handled this"
            echo "::error::  - Token lacks publish permission for this slug"
            echo "::error::  - ClawHub API is down (check https://clawhub.ai)"
            exit 1
          fi
          echo "✓ clawhub skill publish exited 0"
          # Show publish output (usually includes the new version URL)
          sed 's/^/  /' "$PUBLISH_LOG"

          # Verify the publish actually worked by re-checking the registry.
          # Registry read-after-write may lag by a few seconds; retry up to 3 times.
          PUBLISHED=""
          for attempt in 1 2 3; do
            sleep 5
            verify_json=$(clawhub inspect stellar-trails --json 2>/dev/null || echo '{}')
            PUBLISHED=$(echo "$verify_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print((d.get('latestVersion') or {}).get('version') or '')" 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "${{ steps.version.outputs.version }}" ]; then
              break
            fi
            echo "  attempt $attempt: registry shows v${PUBLISHED:-<not found>} (expected v${{ steps.version.outputs.version }})"
          done

          if [ "$PUBLISHED" != "${{ steps.version.outputs.version }}" ]; then
            echo "⚠️ ClawHub registry shows v${PUBLISHED:-unknown} after publish (expected v${{ steps.version.outputs.version }})"
            echo "⚠️ The publish command exited 0 and reported success."
            echo "⚠️ This may be a propagation delay. The version should appear within a few minutes."
            echo "⚠️ Treating as WARNING, not failure — publish command succeeded."
          else
            echo "✓ Published stellar-trails@${{ steps.version.outputs.version }} to ClawHub (verified: registry shows v$PUBLISHED)"
          fi

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ steps.version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Zip file | stellar-trails.zip |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.build.outputs.zip_size }} bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA-256 | \`${{ steps.build.outputs.zip_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release URL | ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ClawHub | https://clawhub.ai/hoshiyomix/stellar-trails |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on ZAI" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "clawhub install stellar-trails" >> $GITHUB_STEP_SUMMARY
          echo "cp /tmp/stellar-trails.zip /home/user_skills/stellar-trails.zip" >> $GITHUB_STEP_SUMMARY
          echo "touch /home/user_skills/.stellar-trails.usermark" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
