<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>stellar-trails</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    overflow:hidden;background:#050714;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  /* Milky way — animated star layers */
  .mw{position:fixed;inset:0;z-index:0;overflow:hidden}
  .mw::before,.mw::after{
    content:'';position:absolute;inset:-50%;
  }
  .mw::before{
    background:
      radial-gradient(2px 2px at 20% 30%,#fff,transparent),
      radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.8),transparent),
      radial-gradient(1px 1px at 60% 20%,#fff,transparent),
      radial-gradient(2px 2px at 80% 50%,rgba(255,255,255,.6),transparent),
      radial-gradient(1px 1px at 10% 80%,#fff,transparent),
      radial-gradient(1px 1px at 90% 10%,rgba(255,255,255,.5),transparent),
      radial-gradient(2px 2px at 50% 90%,#fff,transparent),
      radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,.7),transparent),
      radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,.4),transparent);
    background-size:300px 300px;
    animation:drift1 60s linear infinite;
  }
  .mw::after{
    background:
      radial-gradient(1px 1px at 15% 40%,rgba(167,139,250,.8),transparent),
      radial-gradient(2px 2px at 55% 60%,rgba(34,211,238,.5),transparent),
      radial-gradient(1px 1px at 75% 30%,rgba(251,113,133,.6),transparent),
      radial-gradient(1px 1px at 25% 90%,rgba(167,139,250,.4),transparent),
      radial-gradient(2px 2px at 85% 75%,rgba(34,211,238,.3),transparent);
    background-size:400px 400px;
    animation:drift2 90s linear infinite;
  }
  /* Nebula glow */
  .nebula{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 600px 400px at 50% 40%,rgba(139,92,246,.08),transparent 70%),
      radial-gradient(ellipse 400px 300px at 30% 70%,rgba(236,72,153,.05),transparent 70%);
  }
  @keyframes drift1{to{transform:translate(300px,300px)}}
  @keyframes drift2{to{transform:translate(-400px,-400px)}}

  /* Center content */
  .center{position:relative;z-index:1;text-align:center;animation:fadeUp 1s ease-out}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .mascot{
    width:200px;height:200px;border-radius:50%;object-fit:cover;
    margin:0 auto 1.5rem;display:block;
    filter:drop-shadow(0 0 40px rgba(139,92,246,.3));
    animation:float 5s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  h1{
    font-size:1.4rem;font-weight:600;color:#fff;letter-spacing:-.01em;
    margin-bottom:.3rem;
  }
  .sub{font-size:.75rem;color:#8892a8;letter-spacing:.05em}

  /* Single install line */
  .cmd{
    margin-top:1.5rem;font-family:'SF Mono',Monaco,monospace;
    font-size:.7rem;color:#4a5268;cursor:pointer;
    display:inline-flex;align-items:center;gap:.4rem;
    padding:.4rem .8rem;border:1px solid rgba(255,255,255,.06);border-radius:6px;
    transition:border-color .2s;
  }
  .cmd:hover{border-color:rgba(167,139,250,.3)}
  .cmd .p{color:#a78bfa}
  .cmd .h{color:#2dd4bf}
  .cmd .ok{color:#2dd4bf;opacity:0;transition:opacity .3s;font-size:.6rem}
  .cmd.done .ok{opacity:1}

  .invoke{
    margin-top:1rem;font-size:.6rem;color:#4a5268;
  }
  .invoke code{
    color:#22d3ee;background:rgba(34,211,238,.05);padding:1px 5px;border-radius:3px;
  }
</style>
</head>
<body>
<div class="mw"></div>
<div class="nebula"></div>

<div class="center">
  <img class="mascot" src="chibi.png" alt="stellar-trails"
       onerror="this.style.display='none'">
  <h1>stellar-trails</h1>
  <div class="sub">stateless phase machine</div>
  <div class="cmd" onclick="copyCmd(this)">
    <span class="p">$</span><span class="h">clawhub</span> install stellar-trails
    <span class="ok">✓</span>
  </div>
  <div class="invoke">invoke: <code>Skill(command="stellar-trails")</code></div>
</div>

<script>
function copyCmd(el){
  navigator.clipboard.writeText('clawhub install stellar-trails').then(()=>{
    el.classList.add('done');
    setTimeout(()=>el.classList.remove('done'),1500);
  });
}
</script>
</body>
</html>
